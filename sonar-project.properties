# Required project identifiers
sonar.projectKey=Sbiswas3011_SecureDevopsFrontendLab
sonar.organization=sbiswas3011
sonar.projectName=Frontend React App

# Source code and test locations
sonar.sources=frontend-react/src
sonar.tests=frontend-react/src/__tests__

# Exclude unnecessary files
sonar.exclusions=**/node_modules/**,**/*.test.js,**/coverage/**

# Test file patterns
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Coverage reports
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8